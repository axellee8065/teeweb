<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeeWeb - Multiplayer Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; cursor: crosshair; }
    canvas { display: block; }
    #name-input {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(10,10,30,0.95); padding: 40px 50px; border-radius: 16px;
      text-align: center; z-index: 30; border: 2px solid #ffd700;
      box-shadow: 0 0 60px rgba(255,215,0,0.2);
    }
    #name-input h1 { color: #ffd700; margin-bottom: 5px; font-size: 42px; letter-spacing: 4px; }
    #name-input p { color: #888; margin-bottom: 20px; font-size: 14px; }
    #name-input input {
      background: #1a1a3a; border: 2px solid #444; color: white;
      padding: 12px 24px; font-size: 18px; border-radius: 8px;
      text-align: center; outline: none; width: 280px; transition: border 0.3s;
    }
    #name-input input:focus { border-color: #ffd700; }
    #name-input button {
      display: block; margin: 20px auto 0; background: linear-gradient(135deg, #ffd700, #f39c12);
      color: #1a1a2e; border: none; padding: 12px 40px; font-size: 18px;
      font-weight: bold; border-radius: 8px; cursor: pointer; letter-spacing: 1px;
    }
    #name-input button:hover { transform: scale(1.05); }
    #name-input .controls-hint {
      margin-top: 20px; color: #666; font-size: 12px; line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="name-input">
    <h1>TEEWEB</h1>
    <p>Multiplayer Shooter</p>
    <input type="text" id="player-name" placeholder="닉네임 입력" maxlength="16" autofocus>
    <button onclick="startGame()">PLAY</button>
    <div class="controls-hint">
      WASD 이동 | SPACE 점프 | 좌클릭 사격 | 우클릭 훅<br>
      1 피스톨 | 2 샷건 | 3 로켓 | 4 레이저
    </div>
  </div>
  <canvas id="game"></canvas>

  <script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let myId = null, platforms = [], gameState = { players: [], bullets: [], pickups: [], effects: [], killFeed: [] };
let mapWidth = 1600, mapHeight = 900, camera = { x: 0, y: 0 }, connected = false;
const keys = {};
let mouseX = 0, mouseY = 0, mouseDown = false, rightMouseDown = false;
const particles = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Digit1','Digit2','Digit3','Digit4'].includes(e.code)) {
    const wpns = { Digit1: 'pistol', Digit2: 'shotgun', Digit3: 'rocket', Digit4: 'laser' };
    switchWeapon = wpns[e.code];
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mousedown', e => { if(e.button===0) mouseDown=true; if(e.button===2) rightMouseDown=true; });
canvas.addEventListener('mouseup', e => { if(e.button===0) mouseDown=false; if(e.button===2) rightMouseDown=false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

let switchWeapon = null;
let ws = null;

function startGame() {
  const name = document.getElementById('player-name').value.trim() || 'Player';
  document.getElementById('name-input').style.display = 'none';
  connect(name);
}
document.getElementById('player-name').addEventListener('keydown', e => { if(e.key==='Enter') startGame(); });

function connect(name) {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}`);
  ws.onopen = () => { connected = true; ws.send(JSON.stringify({ type: 'name', name })); };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') { myId = msg.id; platforms = msg.platforms; mapWidth = msg.mapWidth; mapHeight = msg.mapHeight; }
    else if (msg.type === 'state') {
      // Spawn particles for effects
      for (const ef of msg.effects || []) {
        if (ef.life === (ef.type === 'explosion' ? 20 : 10)) spawnParticles(ef);
      }
      gameState = msg;
    }
  };
  ws.onclose = () => { connected = false; setTimeout(() => connect(name), 2000); };

  setInterval(() => {
    if (ws.readyState !== 1) return;
    ws.send(JSON.stringify({
      type: 'input', left: !!(keys['KeyA']||keys['ArrowLeft']), right: !!(keys['KeyD']||keys['ArrowRight']),
      jump: !!(keys['KeyW']||keys['ArrowUp']||keys['Space']),
      mouseX: mouseX + camera.x, mouseY: mouseY + camera.y,
      shoot: mouseDown, hook: rightMouseDown, switchWeapon,
    }));
    switchWeapon = null;
  }, 1000 / 60);
}

// Particle system
function spawnParticles(ef) {
  const count = ef.type === 'explosion' ? 30 : ef.type === 'death' ? 20 : 8;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * (ef.type === 'explosion' ? 6 : 3);
    particles.push({
      x: ef.x, y: ef.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - (ef.type === 'death' ? 2 : 0),
      life: 20 + Math.random() * 20, maxLife: 40,
      color: ef.color, size: ef.type === 'explosion' ? 3 + Math.random() * 4 : 2 + Math.random() * 2,
      gravity: ef.type === 'death' ? 0.15 : 0.05,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
    p.vx *= 0.98; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// Drawing
const WEAPON_COLORS = { pistol: '#aaa', shotgun: '#c97', rocket: '#e74c3c', laser: '#3498db' };
const PICKUP_COLORS = { health: '#2ecc71', shotgun: '#c97', rocket: '#e74c3c', laser: '#3498db' };
const PICKUP_ICONS = { health: '+', shotgun: 'S', rocket: 'R', laser: 'L' };

function drawTee(p) {
  if (!p.alive) return;
  const sx = p.x - camera.x, sy = p.y - camera.y;

  ctx.save();
  ctx.translate(sx + 14, sy + 14);

  // Shadow
  ctx.beginPath(); ctx.ellipse(0, 14, 12, 4, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();

  // Body
  const grad = ctx.createRadialGradient(-3, -3, 2, 0, 0, 14);
  grad.addColorStop(0, lightenColor(p.color, 30)); grad.addColorStop(1, p.color);
  ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = darkenColor(p.color, 30); ctx.lineWidth = 1.5; ctx.stroke();

  // Eyes
  const ea = p.angle || 0;
  const eox = Math.cos(ea) * 3, eoy = Math.sin(ea) * 3;
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(-4 + eox, -3 + eoy, 4.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4 + eox, -3 + eoy, 4.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-3 + eox * 1.4, -3 + eoy * 1.4, 2.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(5 + eox * 1.4, -3 + eoy * 1.4, 2.2, 0, Math.PI * 2); ctx.fill();

  // Gun
  const wc = WEAPON_COLORS[p.weapon] || '#888';
  ctx.rotate(ea);
  ctx.fillStyle = '#444'; ctx.fillRect(8, -3, 18, 6);
  ctx.fillStyle = wc; ctx.fillRect(10, -2, 14, 4);
  if (p.weapon === 'rocket') { ctx.fillStyle = '#c0392b'; ctx.fillRect(22, -4, 8, 8); }
  else if (p.weapon === 'shotgun') { ctx.fillStyle = '#a87'; ctx.fillRect(8, -4, 20, 8); }
  ctx.restore();

  // Hook
  if (p.hook) {
    ctx.save();
    ctx.setLineDash([6, 4]);
    ctx.beginPath(); ctx.moveTo(sx + 14, sy + 14);
    ctx.lineTo(p.hook.x - camera.x, p.hook.y - camera.y);
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2; ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(p.hook.x - camera.x, p.hook.y - camera.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.restore();
  }

  // Name tag
  ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillText(p.name, sx + 15, sy - 13);
  ctx.fillStyle = '#fff';
  ctx.fillText(p.name, sx + 14, sy - 14);

  // Health bar
  if (p.health < 100) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; roundRect(ctx, sx - 4, sy - 8, 36, 5, 2); ctx.fill();
    const hc = p.health > 50 ? '#2ecc71' : p.health > 25 ? '#f39c12' : '#e74c3c';
    ctx.fillStyle = hc; roundRect(ctx, sx - 4, sy - 8, 36 * (p.health / 100), 5, 2); ctx.fill();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
}

function lightenColor(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darkenColor(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

function render() {
  updateParticles();
  const me = gameState.players?.find(p => p.id === myId);

  if (me) {
    camera.x += ((me.x - canvas.width / 2 + 14) - camera.x) * 0.1;
    camera.y += ((me.y - canvas.height / 2 + 14) - camera.y) * 0.1;
  }

  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bgGrad.addColorStop(0, '#0a0a2e'); bgGrad.addColorStop(1, '#16213e');
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 50; i++) {
    const sx = ((i * 137 + 50) % mapWidth) - camera.x * 0.3;
    const sy = ((i * 97 + 30) % mapHeight) - camera.y * 0.3;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 1;
  const gs = 50;
  for (let x = -(camera.x % gs); x < canvas.width; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
  for (let y = -(camera.y % gs); y < canvas.height; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

  // Platforms with gradient
  for (const p of platforms) {
    const px = p.x - camera.x, py = p.y - camera.y;
    const pGrad = ctx.createLinearGradient(px, py, px, py + p.h);
    pGrad.addColorStop(0, '#3d3d6b'); pGrad.addColorStop(1, '#2a2a4a');
    ctx.fillStyle = pGrad; roundRect(ctx, px, py, p.w, p.h, 3); ctx.fill();
    ctx.fillStyle = 'rgba(100,100,200,0.3)'; ctx.fillRect(px, py, p.w, 2);
  }

  // Pickups
  for (const pk of (gameState.pickups || [])) {
    const px = pk.x - camera.x, py = pk.y - camera.y;
    const pulse = 0.8 + Math.sin(Date.now() / 200) * 0.2;
    ctx.save(); ctx.translate(px, py); ctx.scale(pulse, pulse);
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fillStyle = PICKUP_COLORS[pk.type] + '44'; ctx.fill();
    ctx.strokeStyle = PICKUP_COLORS[pk.type]; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(PICKUP_ICONS[pk.type], 0, 0);
    // Glow
    ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2);
    ctx.fillStyle = PICKUP_COLORS[pk.type] + '11'; ctx.fill();
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.beginPath(); ctx.arc(p.x - camera.x, p.y - camera.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Bullets with trails
  for (const b of (gameState.bullets || [])) {
    const bx = b.x - camera.x, by = b.y - camera.y;
    ctx.beginPath(); ctx.arc(bx, by, b.size || 4, 0, Math.PI * 2);
    ctx.fillStyle = b.weapon === 'laser' ? '#00bfff' : b.weapon === 'rocket' ? '#ff6b35' : b.color || '#ff0';
    ctx.fill();
    // Glow
    ctx.beginPath(); ctx.arc(bx, by, (b.size || 4) * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = (b.weapon === 'laser' ? 'rgba(0,191,255,' : b.weapon === 'rocket' ? 'rgba(255,107,53,' : 'rgba(255,255,100,') + '0.15)';
    ctx.fill();
  }

  // Players
  for (const p of (gameState.players || [])) drawTee(p);

  // === HUD ===

  // Death screen
  if (me && !me.alive) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = 'bold 48px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#e74c3c';
    ctx.fillText('ELIMINATED', canvas.width / 2, canvas.height / 2 - 20);
    ctx.font = '18px sans-serif'; ctx.fillStyle = '#aaa';
    ctx.fillText('리스폰 대기중...', canvas.width / 2, canvas.height / 2 + 20);
  }

  if (me) {
    // Health bar (bottom center)
    const hbw = 220, hbh = 16, hbx = canvas.width / 2 - hbw / 2, hby = canvas.height - 50;
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; roundRect(ctx, hbx - 2, hby - 2, hbw + 4, hbh + 4, 6); ctx.fill();
    const hc = me.health > 50 ? '#2ecc71' : me.health > 25 ? '#f39c12' : '#e74c3c';
    const hGrad = ctx.createLinearGradient(hbx, hby, hbx + hbw, hby);
    hGrad.addColorStop(0, hc); hGrad.addColorStop(1, darkenColor(hc.startsWith('#') ? hc : '#2ecc71', 30));
    ctx.fillStyle = hGrad; roundRect(ctx, hbx, hby, hbw * (me.health / 100), hbh, 4); ctx.fill();
    ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
    ctx.fillText(`${me.health} HP`, canvas.width / 2, hby + 12);

    // Weapon bar (bottom)
    const weapons = ['pistol', 'shotgun', 'rocket', 'laser'];
    const wbx = canvas.width / 2 - 120, wby = canvas.height - 85;
    weapons.forEach((w, i) => {
      const x = wbx + i * 62, active = me.weapon === w;
      const ammo = w === 'pistol' ? '∞' : (me.ammo[w] || 0);
      ctx.fillStyle = active ? 'rgba(255,215,0,0.3)' : 'rgba(0,0,0,0.4)';
      roundRect(ctx, x, wby, 56, 28, 4); ctx.fill();
      if (active) { ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5; roundRect(ctx, x, wby, 56, 28, 4); ctx.stroke(); }
      ctx.fillStyle = ammo === 0 ? '#555' : (active ? '#ffd700' : '#aaa');
      ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(`${i+1} ${w.charAt(0).toUpperCase()}`, x + 28, wby + 13);
      ctx.font = '9px sans-serif'; ctx.fillStyle = ammo === 0 ? '#555' : '#888';
      ctx.fillText(ammo, x + 28, wby + 23);
    });
  }

  // Scoreboard (top left)
  const sorted = [...(gameState.players || [])].sort((a, b) => b.score - a.score);
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; roundRect(ctx, 10, 10, 190, 30 + sorted.length * 20, 6); ctx.fill();
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left'; ctx.fillStyle = '#ffd700';
  ctx.fillText('SCOREBOARD', 20, 28);
  sorted.forEach((p, i) => {
    const y = 48 + i * 20;
    ctx.fillStyle = p.id === myId ? 'rgba(255,215,0,0.15)' : 'transparent';
    ctx.fillRect(15, y - 12, 180, 18);
    ctx.fillStyle = p.color; ctx.font = '12px sans-serif';
    ctx.fillText(`${p.alive ? '' : '💀'}${p.name}`, 20, y);
    ctx.fillStyle = '#aaa'; ctx.textAlign = 'right';
    ctx.fillText(`${p.score}/${p.deaths}`, 190, y);
    ctx.textAlign = 'left';
  });

  // Kill feed (top right)
  const kf = gameState.killFeed || [];
  kf.forEach((k, i) => {
    const y = 20 + i * 22;
    ctx.font = '12px sans-serif'; ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    const text = k.killer === k.victim ? `${k.victim} suicided` : `${k.killer} → ${k.victim}`;
    const tw = ctx.measureText(text).width;
    roundRect(ctx, canvas.width - tw - 30, y - 12, tw + 20, 18, 4); ctx.fill();
    ctx.fillStyle = '#eee'; ctx.fillText(text, canvas.width - 15, y);
  });

  // Controls hint
  ctx.font = '10px sans-serif'; ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('WASD 이동 | SPACE 점프 | 좌클릭 사격 | 우클릭 훅 | 1234 무기', canvas.width - 15, canvas.height - 15);

  requestAnimationFrame(render);
}

render();
  </script>
</body>
</html>
